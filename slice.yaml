schema_version: "1.0"

# ── Identity ──────────────────────────────────────────────────────────────────
id: "slice-step"
name: "Stepper Motor Driver Carrier"
status: "prototype"
category: "actuation"

summary: "4-channel stepper motor driver slice using A4988 carrier modules."
description: null

# ── Versioning ────────────────────────────────────────────────────────────────
version:
  hardware: "0.1.0"
  firmware: "0.1.0"
  manifest: "0.1.0"

# ── Compatibility ─────────────────────────────────────────────────────────────
compatibility:
  slice_spec: ">=0.1.0 <0.2.0"
  crumbs_protocol: null
  anolis_provider_api: null

# ── Hardware ──────────────────────────────────────────────────────────────────
hardware:
  mcu:
    type: "dev-board-socket"
    form_factor: "nano"
    primary: "ATmega328P"
    supported:
      - "ATmega328P"
  primary_ic:
    manufacturer: "Allegro"
    part_number: "A4988"
  hw_gen_current: 1
  hw_gen_supported: [1]
  pcb:
    layers: 2
    thickness: "1.6mm"
    copper_weight: "1oz"
    dimensions: "70mm x 100mm"
  connectors:
    - ref: "J1"
      type: "slice-bus-10pin"
      purpose: "power-and-i2c"
  mounting:
    pattern: "slice-standard-v0"
    hole_size: "M3"
    inset: "5mm"
  pcb_color_prototype: null
  pcb_color_production: null
  enclosure:
    supported: false
    path: null

# ── Electrical ────────────────────────────────────────────────────────────────
electrical:
  input_voltage: "12V"
  logic_voltage: "5V"
  max_current: null
  protection:
    reverse_polarity: false
    input_esd: false
    fuse: false
  isolation:
    present: false

# ── Interfaces ────────────────────────────────────────────────────────────────
interfaces:
  host:
    type: "i2c"
    address_default: 20
    address_configurable: true
  data:
    inputs: []
    outputs:
      - name: "CH1"
        type: "stepper-step-dir"
      - name: "CH2"
        type: "stepper-step-dir"
      - name: "CH3"
        type: "stepper-step-dir"
      - name: "CH4"
        type: "stepper-step-dir"

# ── Capabilities ──────────────────────────────────────────────────────────────
capabilities:
  - id: "stepper_drive"
    channels: 4
    control_modes: ["position", "speed"]

# ── Firmware ──────────────────────────────────────────────────────────────────
firmware:
  required: true
  path: "firmware/"
  language: "c++"
  framework: "arduino"
  targets:
    - "nano"
  lib_deps:
    - "AccelStepper"

# ── Protocol ──────────────────────────────────────────────────────────────────
protocol:
  type: "i2c-custom"
  discovery:
    supported: false
  commands: []

# ── Software ──────────────────────────────────────────────────────────────────
software: null

# ── Artifacts ─────────────────────────────────────────────────────────────────
artifacts:
  schematic: "hardware/BREAD_Slice.kicad_sch"
  pcb: "hardware/BREAD_Slice.kicad_pcb"
  firmware: "firmware/"
  docs: null
  bom: "documentation/BOM_STEP.ods"
  gerbers: "hardware/outputs/"
  pick_and_place: null
  datasheets:
    - "documentation/A4988.pdf"
    - "documentation/STEP.pdf"

# ── Manufacturing ─────────────────────────────────────────────────────────────
manufacturing:
  assembly_type: "manual"
  preferred_fab: null
  dnp_parts: []
  critical_parts: []
  substitutions_allowed: true

# ── Validation ────────────────────────────────────────────────────────────────
validation:
  status: "not_validated"
  tested_revisions: []
  tests:
    electrical: false
    firmware: false
    environmental: false
    integration: false
  known_issues: []

# ── Safety ────────────────────────────────────────────────────────────────────
safety:
  hazards: []
  max_safe_voltage: "12V"
  intended_environment: "lab"
  not_for:
    - "human safety critical systems"

# ── Dependencies ──────────────────────────────────────────────────────────────
dependencies:
  hardware: []
  firmware_libraries: []
  software_packages: []

# ── Relations ─────────────────────────────────────────────────────────────────
related:
  supersedes: null
  superseded_by: null
  variants: []
  compatible_slices: []

# ── Maintainers ───────────────────────────────────────────────────────────────
maintainers:
  - name: "Cameron Brooks"
    role: "owner"

# ── License ───────────────────────────────────────────────────────────────────
license:
  hardware: "CERN-OHL-S-2.0"
  firmware: "GPL-3.0-or-later"
  software: null
  docs: "CC-BY-4.0"

# ── Repository ────────────────────────────────────────────────────────────────
repository:
  url: "https://github.com/feastorg/Slice_STEP"

# ── Metadata ──────────────────────────────────────────────────────────────────
metadata:
  created: "2026-05-19"
  updated: "2026-05-19"
  tags:
    - "stepper-motor"
    - "motion-control"
    - "a4988"
    - "accelstepper"
